<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NoRmo.acc | 靈魂碎片採集</title>
    <style>
        :root {
            --bg-color: #f7f3ee; 
            --ink-color: #333333;
            --paper-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-color);
            color: var(--ink-color);
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            height: 100dvh; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .element {
            position: absolute;
            opacity: 0.12;
            animation: float-random linear infinite;
            will-change: transform;
        }

        @keyframes float-random {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(10px, -15px) rotate(5deg); }
            66% { transform: translate(-10px, 10px) rotate(-5deg); }
        }

        .container {
            width: 88%;
            max-width: 350px;
            height: 480px; 
            background: var(--paper-white);
            padding: 25px 20px;
            border: 2px solid var(--ink-color);
            box-shadow: 10px 10px 0px var(--ink-color);
            text-align: center;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        h2 { 
            font-size: 1.1rem; 
            margin: 0 0 15px 0; 
            line-height: 1.5; 
            font-weight: 900; /* 題目粗體 */
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .name-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--ink-color);
            padding: 10px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            background: transparent;
            margin-bottom: 20px;
        }

        .options-list { display: grid; gap: 8px; }

        .option-btn {
            background: var(--paper-white);
            border: 1.5px solid var(--ink-color);
            padding: 12px 14px;
            text-align: left;
            font-size: 0.85rem;
            color: #000000; /* 選項字體黑色 */
            cursor: pointer;
            transition: all 0.1s ease;
        }

        /* 選取後的翻白效果：加上 !important 確保強制覆蓋 */
        .option-btn.selected {
            background: var(--ink-color) !important;
            color: #ffffff !important;
            transform: translateX(4px);
        }

        .action-area {
            height: 65px; 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .action-btn {
            background: var(--paper-white);
            border: 2px solid var(--ink-color);
            padding: 10px 35px;
            font-weight: 900;
            box-shadow: 4px 4px 0px var(--ink-color);
            font-size: 0.95rem;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .action-btn.show {
            visibility: visible;
            opacity: 1;
        }

        .action-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--ink-color);
        }

        .res-persona { font-size: 1.5rem; font-weight: 900; margin: 10px 0; }
        .res-desc { font-size: 0.8rem; line-height: 1.7; color: #444; }
        .hidden-code { font-size: 0.55rem; color: #ccc; margin-top: 20px; font-family: monospace; }

        .fade { animation: fadeIn 0.3s ease-out forwards; width: 100%; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="container" id="app">
        <div class="fade content-area" id="main-content">
            <h2>在開始採集靈魂碎片前<br>請留下妳的名字（填寫領取獎勵）</h2>
            <input type="text" id="user-name" class="name-input" placeholder="怎麼稱呼妳？" maxlength="8" oninput="checkName(this)">
        </div>
        <div class="action-area" id="footer-area">
            <button class="action-btn" id="start-btn" onclick="start()">啟動鑑定</button>
        </div>
    </div>

    <script>
        // --- 100 個隨機背景元素 ---
        const icons = ['✦', '✧', '★', '●', '☁', '〰', '◌', '✶', '＊', '・'];
        const canvas = document.getElementById('bg-canvas');
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < 100; i++) {
            const el = document.createElement('div');
            el.className = 'element';
            el.innerText = icons[Math.floor(Math.random() * icons.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = Math.random() * 100 + '%';
            el.style.fontSize = (Math.random() * 17 + 8) + 'px';
            el.style.animationDuration = (Math.random() * 5 + 4) + 's';
            el.style.animationDelay = (Math.random() * 5) + 's';
            fragment.appendChild(el);
        }
        canvas.appendChild(fragment);

        let userName = "";
        let step = 0;
        let answers = [];

        const questions = [
            { q: "睜開眼，今天喚醒妳的是？", options: [{t:"趕在 8:10 的最後一通鬧鐘", v:"A"}, {t:"充滿儀式感的早午餐約會", v:"B"}, {t:"提醒 9:30 晨會的通知", v:"C"}, {t:"拉開窗簾準備前往旅行", v:"D"}] },
            { q: "推開衣櫃，妳想著今天要穿上...", options: [{t:"寬鬆衛衣配上工裝褲或百褶裙", v:"A"}, {t:"軟綿的針織上衣配西裝褲或長裙", v:"B"}, {t:"個性十足的 Oversize 上衣或皮衣", v:"C"}, {t:"俐落的西裝外套、襯衫或貼身洋裝", v:"D"}] },
            { q: "照鏡子感覺少了點什麼，妳拿起桌上的...", options: [{t:"一對精緻耳飾", v:"A"}, {t:"一條鎖骨項鍊", v:"B"}, {t:"幾枚疊戴戒指", v:"C"}, {t:"一副氛圍眼鏡", v:"D"}] },
            { q: "拿起後卻猶豫了一下，因為...", options: [{t:"這太貴了不敢隨便戴出門", v:"P"}, {t:"發現它居然掉色了", v:"Q"}, {t:"感覺走在路上會撞款", v:"U"}, {t:"想起當時的購買體驗不太好", v:"S"}] }
        ];

        window.checkName = (input) => {
            const btn = document.getElementById('start-btn');
            if(input.value.trim().length > 0) btn.classList.add('show');
            else btn.classList.remove('show');
        }

        function start() {
            userName = document.getElementById('user-name').value;
            render();
        }

        function render() {
            const content = document.getElementById('main-content');
            const footer = document.getElementById('footer-area');
            const data = questions[step];

            content.innerHTML = `
                <div class="fade">
                    <h2>${data.q}</h2>
                    <div class="options-list">
                        ${data.options.map(o => `<button class="option-btn" onclick="handleSelect('${o.v}', this)">${o.t}</button>`).join('')}
                    </div>
                </div>
            `;
            footer.innerHTML = `<button class="action-btn" id="next-btn" onclick="handleNext()">下一步 →</button>`;
        }

        window.handleSelect = (val, btn) => {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            answers[step] = val;
            document.getElementById('next-btn').classList.add('show');
        };

        // --- 重點修正：點擊「下一步」時立即執行清空 ---
        window.handleNext = () => {
            const currentBtns = document.querySelectorAll('.option-btn');
            
            // 1. 立即強制移除畫面上所有按鈕的反白效果
            currentBtns.forEach(b => {
                b.classList.remove('selected');
                b.style.backgroundColor = "var(--paper-white)"; // 額外強制背景色回歸
                b.style.color = "#000000"; // 額外強制文字顏色回歸
            });
            
            // 2. 稍微延遲一點點時間（讓瀏覽器處理樣式更新）再渲染下一題
            setTimeout(() => {
                if (step < questions.length - 1) {
                    step++; 
                    render(); 
                } else {
                    showFinal();
                }
            }, 10); 
        };

        function showFinal() {
            const container = document.getElementById('app');
            const style = answers[1];
            let title = "", desc = "";
            if (style === 'A') { title = "復古時代的穿越者"; desc = "妳在經典中尋找復古活力，不被框架束縛。飾品是妳對生活保持熱忱的標記。"; }
            else if (style === 'B') { title = "被誤認成韓星的人"; desc = "妳追求視覺上的柔和細緻，懂得在安靜中展現力量，讓優雅成為日常。"; }
            else if (style === 'C') { title = "不羈的街頭時尚指標"; desc = "妳拒絕平庸。大膽、帥氣是妳的代名詞，飾品是妳最堅定的態度。"; }
            else { title = "自帶氣場的模特"; desc = "妳展現出俐落與自信。不需要張揚，簡約單品最能映照妳內心的光芒。"; }

            container.innerHTML = `
                <div class="fade content-area">
                    <p style="font-size:0.85rem; margin-bottom:5px;">${userName} 妳好，</p>
                    <p style="font-size:0.7rem; color:#aaa;">妳的 NoRmo 靈魂是：</p>
                    <div class="res-persona">【 ${title} 】</div>
                    <p class="res-desc">${desc}</p>
                    <p style="margin-top:15px; font-weight:bold; font-size:0.8rem;">📸 截圖本頁傳回官方Line✉️<br>領取妳的專屬折扣碼（每人限領一張）</p>
                    <div class="hidden-code">UID: ${answers.join('')}-${Math.floor(Math.random()*800+100)}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
